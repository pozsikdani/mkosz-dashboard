name: Napi dashboard frissítés

on:
  schedule:
    - cron: '17 6 * * *'  # 6:17 UTC (8:17 CET) — after scoresheet extraction at 6:00
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Python csomagok telepítése
        run: pip install PyMuPDF requests beautifulsoup4

      - name: Stats DB letöltése
        run: git clone --depth 1 https://github.com/pozsikdani/mkosz-stats.git /tmp/mkosz-stats

      - name: Dashboard generálás
        env:
          STATS_DB_PATH: /tmp/mkosz-stats/mkosz_stats.sqlite
        run: python3 generate_dashboards.py site

      - name: Commit és push ha változott
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html dashboards/ dashboards-a/ dashboards-noi/ leftoverz/ dashboards-mefob/ dashboards-mefob-ferfi/
          git diff --staged --quiet || (
            git commit -m "Napi frissítés (auto): $(date +%Y-%m-%d)" &&
            git push
          )
